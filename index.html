<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playlist du What The Fun</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;

      --card-purple: #aa00ff;
      --card-yellow: #f2d774;
      --card-pink: #e8b8cf;

      --radius: 18px;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 10px 24px rgba(0, 0, 0, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      width: 100%;
      max-width: 1800px;
      margin: 0 auto;
      padding: 18px 18px 28px;
    }

    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-bottom: 22px;
    }

    .header img {
      height: 34px;
      width: auto;
      object-fit: contain;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(28px, 2.2vw, 44px);
      font-weight: 800;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: #111;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
    }

    .track {
      border: none;
      border-radius: var(--radius);
      padding: 20px 20px 18px;
      min-height: 165px;
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease;
      box-shadow: var(--shadow);
      text-align: left;
      width: 100%;
      font: inherit;
    }

    .track:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .track:active {
      transform: scale(0.985);
    }

    .track:focus-visible {
      outline: 3px solid #111;
      outline-offset: 2px;
    }

    .track.purple {
      background: var(--card-purple);
      color: #ffffff;
    }

    .track.purple .time {
      color: rgba(255, 255, 255, 0.88);
    }

    .track.yellow {
      background: var(--card-yellow);
      color: #111111;
    }

    .track.yellow .time {
      color: rgba(17, 17, 17, 0.72);
    }

    .track.pink {
      background: var(--card-pink);
      color: #111111;
    }

    .track.pink .time {
      color: rgba(17, 17, 17, 0.72);
    }

    .track h3 {
      margin: 0 0 18px 0;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 800;
    }

    .track .time {
      font-size: 17px;
      line-height: 1.2;
    }

    .track.wide {
      min-height: 120px;
    }

    .track.full {
      grid-column: 1 / -1;
      min-height: 120px;
    }

    .track.playing {
      box-shadow:
        0 0 0 3px rgba(17, 17, 17, 0.12),
        0 12px 30px rgba(0, 0, 0, 0.18);
      transform: translateY(-1px);
    }

    .status {
      text-align: center;
      padding: 30px 12px;
      color: #666;
      font-size: 16px;
    }

    @media (max-width: 900px) {
      .header {
        gap: 10px;
        margin-bottom: 18px;
      }

      .header img {
        height: 28px;
      }

      .track {
        min-height: 140px;
        padding: 18px;
      }

      .track h3 {
        font-size: 18px;
        margin-bottom: 14px;
      }

      .track .time {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="logo.png" alt="Logo What The Fun">
      <h1>PLAYLIST DU WHAT THE FUN</h1>
    </div>

    <div class="grid" id="playlist"></div>
    <div class="status" id="status">Chargement des pistes…</div>
  </div>

  <script>
    const playlist = document.getElementById("playlist");
    const statusEl = document.getElementById("status");

    let currentAudio = null;
    let currentCard = null;
    let currentTimeEl = null;

    function formatTime(seconds) {
      if (!isFinite(seconds)) return "00:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function stopCurrentTrack() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }

      if (currentCard) {
        currentCard.classList.remove("playing");
      }

      if (currentAudio && currentTimeEl) {
        currentTimeEl.textContent = `00:00 / ${formatTime(currentAudio.duration)}`;
      }

      currentAudio = null;
      currentCard = null;
      currentTimeEl = null;
    }

    function normalizeTrack(track) {
      return {
        title: track.title || track.name || "Sans titre",
        file: track.file || track.src || "",
        type: track.type || "purple",
        extraClass: track.extraClass || "",
      };
    }

    function createTrackCard(rawTrack) {
      const track = normalizeTrack(rawTrack);

      const card = document.createElement("button");
      card.className = `track ${track.type}${track.extraClass ? " " + track.extraClass : ""}`;
      card.type = "button";

      const title = document.createElement("h3");
      title.textContent = track.title;

      const time = document.createElement("div");
      time.className = "time";
      time.textContent = "00:00 / 00:00";

      const audio = document.createElement("audio");
      audio.src = track.file;
      audio.preload = "metadata";

      audio.addEventListener("loadedmetadata", () => {
        time.textContent = `00:00 / ${formatTime(audio.duration)}`;
      });

      audio.addEventListener("timeupdate", () => {
        if (currentAudio === audio) {
          time.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
        }
      });

      audio.addEventListener("ended", () => {
        card.classList.remove("playing");
        time.textContent = `00:00 / ${formatTime(audio.duration)}`;

        if (currentAudio === audio) {
          currentAudio = null;
          currentCard = null;
          currentTimeEl = null;
        }
      });

      card.addEventListener("click", async () => {
        if (currentAudio && currentAudio !== audio) {
          stopCurrentTrack();
        }

        if (currentAudio === audio) {
          stopCurrentTrack();
          return;
        }

        try {
          audio.currentTime = 0;
          await audio.play();

          currentAudio = audio;
          currentCard = card;
          currentTimeEl = time;
          card.classList.add("playing");
        } catch (err) {
          console.error("Erreur lecture audio :", err);
        }
      });

      card.appendChild(title);
      card.appendChild(time);
      card.appendChild(audio);

      return card;
    }

    async function loadTracks() {
      try {
        const response = await fetch("tracks.json");
        if (!response.ok) {
          throw new Error("Impossible de charger tracks.json");
        }

        const data = await response.json();

        const tracks = Array.isArray(data) ? data : data.tracks;

        if (!Array.isArray(tracks) || tracks.length === 0) {
          throw new Error("Aucune piste trouvée dans tracks.json");
        }

        playlist.innerHTML = "";
        tracks.forEach(track => {
          playlist.appendChild(createTrackCard(track));
        });

        statusEl.style.display = "none";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Erreur de chargement de la playlist.";
      }
    }

    loadTracks();
  </script>
</body>
</html>
