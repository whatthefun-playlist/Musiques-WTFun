<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playlist du What The Fun</title>
  <style>
    :root {
      --bg: #1b1a37;
      --text: ##f8f6f1;

      --card-purple: #aa00ff;
      --card-yellow: #f2d774;
      --card-pink: #e8b8cf;

      --radius: 18px;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 10px 24px rgba(0, 0, 0, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      width: 100%;
      max-width: 1800px;
      margin: 0 auto;
      padding: 18px 18px 28px;
    }

    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-bottom: 22px;
    }

    .header img {
      height: 34px;
      width: auto;
      object-fit: contain;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(28px, 2.2vw, 44px);
      font-weight: 800;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: #111111;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .main-grid {
      grid-template-columns: repeat(5, minmax(250px, 1fr));
    }

    .live-grid {
      grid-template-columns: repeat(3, minmax(250px, 1fr));
      margin-top: 16px;
    }

    .intro-grid {
      grid-template-columns: 1fr;
      margin-top: 16px;
    }

    .track {
      border: none;
      border-radius: var(--radius);
      padding: 20px 20px 18px;
      min-height: 165px;
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
      box-shadow: var(--shadow);
      text-align: left;
      width: 100%;
      font: inherit;
    }

    .track:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .track:active {
      transform: scale(0.985);
    }

    .track:focus-visible {
      outline: 3px solid #111111;
      outline-offset: 2px;
    }

    .track.purple {
      background: var(--card-purple);
      color: #ffffff;
    }

    .track.purple .time {
      color: rgba(255, 255, 255, 0.88);
    }

    .track.yellow {
      background: var(--card-yellow);
      color: #111111;
      min-height: 120px;
    }

    .track.yellow .time {
      color: rgba(17, 17, 17, 0.72);
    }

    .track.pink {
      background: var(--card-pink);
      color: #111111;
      min-height: 120px;
    }

    .track.pink .time {
      color: rgba(17, 17, 17, 0.72);
    }

    .track h3 {
      margin: 0 0 18px 0;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 800;
    }

    .track .time {
      font-size: 17px;
      line-height: 1.2;
    }

    .track.playing {
      box-shadow:
        0 0 0 3px rgba(17, 17, 17, 0.14),
        0 12px 30px rgba(0, 0, 0, 0.18);
      transform: translateY(-1px);
    }

    .status {
      text-align: center;
      padding: 30px 12px;
      color: #666666;
      font-size: 16px;
    }

    @media (max-width: 1400px) {
      .main-grid {
        grid-template-columns: repeat(4, minmax(220px, 1fr));
      }
    }

    @media (max-width: 1100px) {
      .main-grid {
        grid-template-columns: repeat(3, minmax(220px, 1fr));
      }

      .live-grid {
        grid-template-columns: repeat(3, minmax(200px, 1fr));
      }
    }

    @media (max-width: 768px) {
      .main-grid {
        grid-template-columns: repeat(2, minmax(180px, 1fr));
      }

      .live-grid {
        grid-template-columns: 1fr;
      }

      .track {
        min-height: 140px;
        padding: 18px;
      }

      .track h3 {
        font-size: 18px;
        margin-bottom: 14px;
      }

      .track .time {
        font-size: 15px;
      }

      .header {
        gap: 10px;
        margin-bottom: 18px;
      }

      .header img {
        height: 28px;
      }
    }

    @media (max-width: 560px) {
      .main-grid,
      .intro-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
<img src="LOGO_What The Fun_Blanc_RVB.png" alt="Logo What The Fun">
      <h1>PLAYLIST DU WHAT THE FUN</h1>
    </div>

    <div class="grid main-grid" id="playlist-main"></div>
    <div class="grid live-grid" id="playlist-live"></div>
    <div class="grid intro-grid" id="playlist-intro"></div>

    <div class="status" id="status">Chargement des pistes…</div>
  </div>

 <script>
  const mainGrid = document.getElementById("playlist-main");
  const liveGrid = document.getElementById("playlist-live");
  const introGrid = document.getElementById("playlist-intro");
  const statusEl = document.getElementById("status");

  const player = new Audio();
  player.preload = "metadata";

  let currentCard = null;
  let currentTimeEl = null;
  let currentDuration = 0;
  let currentSrc = "";

  function formatTime(seconds) {
    if (!isFinite(seconds)) return "00:00";
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
  }

  function stopCurrentTrack() {
    player.pause();
    player.currentTime = 0;

    if (currentCard) currentCard.classList.remove("playing");
    if (currentTimeEl) currentTimeEl.textContent = `00:00 / ${formatTime(currentDuration)}`;

    currentCard = null;
    currentTimeEl = null;
    currentDuration = 0;
    currentSrc = "";
  }

  function normalizeTrack(track) {
    return {
      title: track.title || track.name || "Sans titre",
      file: track.file || track.src || "",
      type: track.type || "purple"
    };
  }

  function createTrackCard(rawTrack) {
    const track = normalizeTrack(rawTrack);

    const card = document.createElement("button");
    card.className = `track ${track.type}`;
    card.type = "button";

    const title = document.createElement("h3");
    title.textContent = track.title;

    const time = document.createElement("div");
    time.className = "time";
    time.textContent = "00:00 / ...";

    card.appendChild(title);
    card.appendChild(time);

    const probe = new Audio(track.file);
    probe.preload = "metadata";
    probe.addEventListener("loadedmetadata", () => {
      time.textContent = `00:00 / ${formatTime(probe.duration)}`;
    });
    probe.addEventListener("error", () => {
      time.textContent = "Fichier introuvable";
      console.error("Erreur fichier audio :", track.file);
    });
    probe.load();

    card.addEventListener("click", async () => {
      try {
        if (currentSrc === track.file) {
          stopCurrentTrack();
          return;
        }

        if (currentCard) stopCurrentTrack();

        player.src = track.file;
        player.load();
        await player.play();

        currentCard = card;
        currentTimeEl = time;
        currentSrc = track.file;
        currentDuration = player.duration || probe.duration || 0;

        card.classList.add("playing");
        time.textContent = `00:00 / ${formatTime(currentDuration)}`;
      } catch (err) {
        console.error("Erreur lecture audio :", track.file, err);
        time.textContent = "Impossible à lire";
      }
    });

    return card;
  }

  player.addEventListener("loadedmetadata", () => {
    currentDuration = player.duration || 0;
    if (currentTimeEl) {
      currentTimeEl.textContent = `${formatTime(player.currentTime)} / ${formatTime(currentDuration)}`;
    }
  });

  player.addEventListener("timeupdate", () => {
    if (currentTimeEl) {
      currentTimeEl.textContent = `${formatTime(player.currentTime)} / ${formatTime(currentDuration)}`;
    }
  });

  player.addEventListener("ended", () => {
    if (currentCard) currentCard.classList.remove("playing");
    if (currentTimeEl) currentTimeEl.textContent = `00:00 / ${formatTime(currentDuration)}`;

    currentCard = null;
    currentTimeEl = null;
    currentDuration = 0;
    currentSrc = "";
  });

  async function loadTracks() {
    try {
      const response = await fetch("tracks.json");
      if (!response.ok) throw new Error("Impossible de charger tracks.json");

      const data = await response.json();
      const tracks = Array.isArray(data) ? data : data.tracks;

      if (!Array.isArray(tracks) || tracks.length === 0) {
        throw new Error("Aucune piste trouvée dans tracks.json");
      }

      mainGrid.innerHTML = "";
      liveGrid.innerHTML = "";
      introGrid.innerHTML = "";

      tracks.forEach(track => {
        const card = createTrackCard(track);

        if (track.type === "yellow") {
          liveGrid.appendChild(card);
        } else if (track.type === "pink") {
          introGrid.appendChild(card);
        } else {
          mainGrid.appendChild(card);
        }
      });

      statusEl.style.display = "none";
    } catch (error) {
      console.error(error);
      statusEl.textContent = "Erreur de chargement de la playlist.";
    }
  }

  loadTracks();
</script>
