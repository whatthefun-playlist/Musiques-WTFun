<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playlist du What The Fun</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: rgba(255, 255, 255, 0.85);

      --card-purple: #aa00ff;
      --card-yellow: #f2d774;
      --card-pink: #e8b8cf;

      --radius: 18px;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 10px 24px rgba(0, 0, 0, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      width: 100%;
      max-width: 1800px;
      margin: 0 auto;
      padding: 18px 18px 28px;
    }

    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-bottom: 22px;
    }

    .header img {
      height: 34px;
      width: auto;
      object-fit: contain;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(28px, 2.2vw, 44px);
      font-weight: 800;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: #111;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
    }

    .track {
      border: none;
      border-radius: var(--radius);
      padding: 20px 20px 18px;
      min-height: 165px;
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease;
      box-shadow: var(--shadow);
      text-align: left;
      width: 100%;
      font: inherit;
    }

    .track:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .track:active {
      transform: scale(0.985);
    }

    .track:focus-visible {
      outline: 3px solid #111;
      outline-offset: 2px;
    }

    .track.purple {
      background: var(--card-purple);
      color: #ffffff;
    }

    .track.purple .time {
      color: rgba(255, 255, 255, 0.88);
    }

    .track.yellow {
      background: var(--card-yellow);
      color: #111111;
    }

    .track.yellow .time {
      color: rgba(17, 17, 17, 0.72);
    }

    .track.pink {
      background: var(--card-pink);
      color: #111111;
    }

    .track.pink .time {
      color: rgba(17, 17, 17, 0.72);
    }

    .track h3 {
      margin: 0 0 18px 0;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 800;
    }

    .track .time {
      font-size: 17px;
      line-height: 1.2;
    }

    .track.wide {
      min-height: 120px;
    }

    .track.full {
      grid-column: 1 / -1;
      min-height: 120px;
    }

    .track.playing {
      box-shadow:
        0 0 0 3px rgba(17, 17, 17, 0.12),
        0 12px 30px rgba(0, 0, 0, 0.18);
      transform: translateY(-1px);
    }

    @media (max-width: 900px) {
      .header {
        gap: 10px;
        margin-bottom: 18px;
      }

      .header img {
        height: 28px;
      }

      .track {
        min-height: 140px;
        padding: 18px;
      }

      .track h3 {
        font-size: 18px;
        margin-bottom: 14px;
      }

      .track .time {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <!-- Remplace "logo.png" par le vrai chemin de ton logo -->
      <img src="logo.png" alt="Logo What The Fun">
      <h1>PLAYLIST DU WHAT THE FUN</h1>
    </div>

    <div class="grid" id="playlist"></div>
  </div>

  <script>
    const tracks = [
      { title: "Bruno Mars – Uptown Funk", file: "sounds/bruno-mars-uptown-funk.mp3", type: "purple" },
      { title: "Dave & Central Cee – Sprinter", file: "sounds/dave-central-cee-sprinter.mp3", type: "purple" },
      { title: "Major Lazer", file: "sounds/major-lazer.mp3", type: "purple" },
      { title: "Gims – Nia Niaô", file: "sounds/gims-nia-niao.mp3", type: "purple" },
      { title: "Macklemore – Can’t Hold Us", file: "sounds/macklemore-cant-hold-us.mp3", type: "purple" },
      { title: "Miley Cyrus – Flowers", file: "sounds/miley-cyrus-flowers.mp3", type: "purple" },

      { title: "SCH – Bande Organisée", file: "sounds/sch-bande-organisee.mp3", type: "purple" },
      { title: "Flo Rida", file: "sounds/flo-rida.mp3", type: "purple" },
      { title: "Beyoncé – Crazy In Love", file: "sounds/beyonce-crazy-in-love.mp3", type: "purple" },
      { title: "Omega El Fuerte – Tu Si Quieres", file: "sounds/omega-el-fuerte-tu-si-quieres.mp3", type: "purple" },
      { title: "Aya Nakamura – Pookie", file: "sounds/aya-nakamura-pookie.mp3", type: "purple" },
      { title: "R3HAB x Pelican – Loca Loca", file: "sounds/r3hab-pelican-loca-loca.mp3", type: "purple" },

      { title: "Wiz Khalifa – Black and Yellow", file: "sounds/wiz-khalifa-black-and-yellow.mp3", type: "purple" },
      { title: "Bruno Mars & ROSE – APT", file: "sounds/bruno-mars-rose-apt.mp3", type: "purple" },
      { title: "Sevdaliza – ALIBI", file: "sounds/sevdaliza-alibi.mp3", type: "purple" },
      { title: "Trinix & One-T – The Magic Key", file: "sounds/trinix-one-t-magic-key.mp3", type: "purple" },
      { title: "Theodora – Zou Bisou", file: "sounds/theodora-zou-bisou.mp3", type: "purple" },

      { title: "Début spectacle", file: "sounds/debut-spectacle.mp3", type: "yellow", extraClass: "wide" },
      { title: "Remerciements humoristes", file: "sounds/remerciements-humoristes.mp3", type: "yellow", extraClass: "wide" },
      { title: "Fin spectacle", file: "sounds/fin-spectacle.mp3", type: "yellow", extraClass: "wide" },

      { title: "Intro Pierre – Péniche", file: "sounds/19-intro-pierre-peniche.mp3", type: "pink", extraClass: "full" }
    ];

    const playlist = document.getElementById("playlist");

    let currentAudio = null;
    let currentCard = null;

    function formatTime(seconds) {
      if (!isFinite(seconds)) return "00:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function stopCurrentTrack() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
      if (currentCard) {
        currentCard.classList.remove("playing");
        const timeEl = currentCard.querySelector(".time");
        const duration = currentAudio?.duration;
        timeEl.textContent = `00:00 / ${formatTime(duration)}`;
      }
      currentAudio = null;
      currentCard = null;
    }

    function createTrackCard(track) {
      const card = document.createElement("button");
      card.className = `track ${track.type}${track.extraClass ? " " + track.extraClass : ""}`;
      card.type = "button";

      const title = document.createElement("h3");
      title.textContent = track.title;

      const time = document.createElement("div");
      time.className = "time";
      time.textContent = "00:00 / 00:00";

      const audio = document.createElement("audio");
      audio.src = track.file;
      audio.preload = "metadata";

      audio.addEventListener("loadedmetadata", () => {
        time.textContent = `00:00 / ${formatTime(audio.duration)}`;
      });

      audio.addEventListener("timeupdate", () => {
        if (currentAudio === audio) {
          time.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
        }
      });

      audio.addEventListener("ended", () => {
        card.classList.remove("playing");
        time.textContent = `00:00 / ${formatTime(audio.duration)}`;
        if (currentAudio === audio) {
          currentAudio = null;
          currentCard = null;
        }
      });

      card.addEventListener("click", async () => {
        if (currentAudio && currentAudio !== audio) {
          stopCurrentTrack();
        }

        if (currentAudio === audio) {
          stopCurrentTrack();
          return;
        }

        try {
          audio.currentTime = 0;
          await audio.play();
          currentAudio = audio;
          currentCard = card;
          card.classList.add("playing");
        } catch (err) {
          console.error("Erreur lecture audio :", err);
        }
      });

      card.appendChild(title);
      card.appendChild(time);
      card.appendChild(audio);

      return card;
    }

    tracks.forEach(track => {
      playlist.appendChild(createTrackCard(track));
    });
  </script>
</body>
</html>
